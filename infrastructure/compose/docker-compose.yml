name: findspam

services:
  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: findspam-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ───────────────────────────────────────────────────────────────
  web:
    build:
      context: ../../
      dockerfile: infrastructure/docker/web.Dockerfile
    container_name: findspam-web
    expose:
      - "3000"
    env_file: ../../.env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    networks:
      - frontend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── API Backend ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infrastructure/docker/api.Dockerfile
    container_name: findspam-api
    expose:
      - "8000"
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
      - data_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Telegram Bot ───────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: ../../apps/telegram-bot
      dockerfile: ../../infrastructure/docker/bot.Dockerfile
    container_name: findspam-bot
    env_file: ../../.env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
      - data_net
    restart: unless-stopped

  # ─── AI Engine ──────────────────────────────────────────────────────────────
  ai-engine:
    build:
      context: ../../apps/ai-engine
      dockerfile: ../../infrastructure/docker/ai.Dockerfile
    container_name: findspam-ai
    expose:
      - "8001"
    env_file: ../../.env
    volumes:
      - ai_models:/app/model_artifacts
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend_net
      - data_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: findspam-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-findspam}
      POSTGRES_USER: ${POSTGRES_USER:-findspam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findspam_user} -d ${POSTGRES_DB:-findspam}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache / PubSub ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: findspam-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - data_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Migration Runner (one-shot) ────────────────────────────────────────────
  migration:
    build:
      context: ../../apps/api
      dockerfile: ../../infrastructure/docker/api.Dockerfile
    container_name: findspam-migration
    command: ["alembic", "upgrade", "head"]
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data_net
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  ai_models:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  data_net:
    driver: bridge
    internal: true
